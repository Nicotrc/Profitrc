version: "3.9"

services:
  profitrc:
    build: .
    container_name: profitrc
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/data          # persist SQLite DBs
      - ./profitrc.log:/app/profitrc.log
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/regime"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
